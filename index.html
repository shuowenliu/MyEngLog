<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngLog Pro v6.0 - 全功能整合版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .event-card { border-left: 4px solid #334155; background: rgba(30, 41, 59, 0.4); transition: all 0.3s; }
        .is-pending { border-left-color: #facc15; box-shadow: inset 4px 0 0 #facc1510; }
        .is-done { border-left-color: #22c55e; }
        .nav-active { background: rgba(34, 211, 238, 0.1); border-right: 3px solid #22d3ee; color: #22d3ee; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="app" class="flex flex-col h-full">
        <header class="h-20 flex-none glass border-b border-white/5 px-8 flex justify-between items-center z-50">
            <div class="flex items-center gap-6">
                <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">ENG<span class="text-cyan-400">LOG</span></h1>
                <nav class="flex gap-2">
                    <button @click="openEditor('note')" class="px-4 py-2 rounded-xl bg-sky-500/10 text-sky-400 text-xs font-bold border border-sky-500/20 hover:bg-sky-500 hover:text-white transition">撰寫日誌</button>
                    <button @click="openEditor('buy')" class="px-4 py-2 rounded-xl bg-emerald-500/10 text-emerald-400 text-xs font-bold border border-emerald-500/20 hover:bg-emerald-500 hover:text-white transition">採購清單</button>
                    <button @click="openEditor('file')" class="px-4 py-2 rounded-xl bg-red-500/10 text-red-400 text-xs font-bold border border-red-500/20 hover:bg-red-500 hover:text-white transition">文件上傳</button>
                </nav>
            </div>

            <div class="flex items-center gap-4">
                <button @click="downloadBackup" class="text-slate-500 hover:text-white transition p-2" title="下載備份">
                    <i class="fas fa-download"></i>
                </button>
                <div v-if="isLoggedIn" class="flex items-center gap-3 bg-cyan-500/5 px-4 py-2 rounded-full border border-cyan-500/20">
                    <i class="fas fa-cloud-check text-cyan-400 text-[10px]"></i>
                    <span class="text-[9px] font-bold text-cyan-400 uppercase tracking-widest">Cloud Ready</span>
                    <button @click="handleSignout" class="text-[9px] text-slate-500 hover:text-red-400 ml-1">登出</button>
                </div>
                <button v-else @click="handleAuth" class="bg-white text-slate-900 px-6 py-2 rounded-full text-xs font-black shadow-lg hover:bg-cyan-400 transition">登入 Google 同步</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-64 flex-none border-r border-white/5 bg-slate-950/40 overflow-y-auto custom-scroll">
                <div class="p-4 text-[10px] font-bold text-slate-600 uppercase tracking-[0.2em] border-b border-white/5 mb-2 italic text-center">Timeline</div>
                <div v-for="event in sortedEvents" :key="event.id" @click="scrollToEvent(event.id)"
                     :class="activeId === event.id ? 'nav-active' : 'text-slate-500 hover:bg-white/5'"
                     class="px-6 py-4 cursor-pointer transition flex flex-col gap-1 border-b border-white/5">
                    <span class="text-[9px] font-mono opacity-40">{{ event.time.split(' ')[0] }}</span>
                    <h4 class="text-xs font-bold truncate">{{ event.title || '未命名事件' }}</h4>
                </div>
            </aside>

            <main class="flex-1 overflow-y-auto p-12 custom-scroll bg-slate-900/10 space-y-10">
                <div v-for="event in sortedEvents" :id="'event-' + event.id" 
                     class="max-w-3xl mx-auto event-card p-8 rounded-[2rem] shadow-2xl relative"
                     :class="event.needsTodo ? (event.isDone ? 'is-done' : 'is-pending') : ''">
                    
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <div class="flex items-center gap-3 mb-2">
                                <span class="text-[10px] bg-white/5 px-2 py-0.5 rounded text-slate-500 font-mono tracking-tighter">{{ event.time }}</span>
                                <span v-if="event.needsTodo" :class="event.isDone ? 'text-green-400 bg-green-400/10' : 'text-yellow-400 bg-yellow-400/10'" class="text-[9px] px-2 rounded font-bold uppercase">
                                    {{ event.isDone ? 'Finished' : 'Action Required' }}
                                </span>
                            </div>
                            <h2 class="text-2xl font-black text-white tracking-tight">{{ event.title }}</h2>
                        </div>
                        <div class="flex gap-2">
                            <button v-if="event.needsTodo" @click="toggleStatus(event)" class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center hover:bg-white/5 transition">
                                <i :class="event.isDone ? 'fas fa-check-circle text-green-400' : 'fas fa-circle text-yellow-500'"></i>
                            </button>
                            <button @click="deleteEvent(event.id)" class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center text-slate-700 hover:text-red-400 transition">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </div>
                    </div>

                    <div class="bg-black/20 p-6 rounded-2xl border border-white/5">
                        <div v-if="event.type === 'note'" class="text-slate-300 text-sm font-mono leading-relaxed whitespace-pre-wrap">{{ event.content }}</div>
                        <div v-if="event.type === 'buy'" class="space-y-1">
                            <div v-for="i in event.items" class="flex justify-between text-xs py-1 border-b border-white/5">
                                <span class="text-slate-300">{{ i.name }}</span>
                                <span class="text-emerald-400 font-bold">NT$ {{ i.price }}</span>
                            </div>
                        </div>
                        <div v-if="event.type === 'file'" class="flex items-center gap-4">
                            <i class="fas fa-file-pdf text-red-500 text-3xl"></i>
                            <div class="flex-1 min-w-0">
                                <p class="text-xs text-white font-bold truncate">{{ event.fileName }}</p>
                                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Document</p>
                            </div>
                            <button @click="viewPDF(event.fileData)" class="px-6 py-2 bg-white text-slate-900 text-[10px] font-black rounded-xl hover:bg-cyan-400 transition uppercase tracking-widest">Open File</button>
                        </div>
                    </div>
                </div>
                <div class="h-40"></div>
            </main>
        </div>

        <div v-if="showEditor" class="fixed inset-0 bg-slate-950/95 backdrop-blur-xl z-[100] flex items-center justify-center p-6">
            <div class="bg-slate-900 w-full max-w-xl rounded-[3rem] p-12 border border-white/10 shadow-2xl">
                <h3 class="text-3xl font-black mb-8 italic text-white uppercase tracking-tighter">New <span class="text-cyan-400">{{ editorType }}</span></h3>
                <div class="space-y-6">
                    <input v-model="tempTitle" class="w-full bg-slate-950 p-5 rounded-2xl border border-white/5 text-white font-bold" placeholder="事件標題...">
                    <div class="flex items-center gap-3 bg-white/5 p-4 rounded-2xl border border-white/5">
                        <input type="checkbox" v-model="tempNeedsTodo" id="td-check" class="w-5 h-5 accent-cyan-500">
                        <label for="td-check" class="text-sm font-bold text-slate-400 italic">標記為待辦任務</label>
                    </div>
                    <div v-if="editorType === 'note'"><textarea v-model="tempContent" class="w-full h-40 bg-slate-950 p-5 rounded-2xl text-sm font-mono text-slate-300" placeholder="內容描述..."></textarea></div>
                    <div v-if="editorType === 'file'"><input type="file" @change="handleFileUpload" accept="application/pdf,image/*" class="text-xs text-slate-500"></div>
                    <div v-if="editorType === 'buy'"><div v-for="i in tempItems" class="flex gap-2"><input v-model="i.name" class="flex-1 bg-slate-950 p-3 rounded-xl text-xs" placeholder="項目名"><input v-model.number="i.price" type="number" class="w-24 bg-slate-950 p-3 rounded-xl text-xs" placeholder="金額"></div></div>
                </div>
                <div class="flex gap-4 mt-10">
                    <button @click="saveEvent" class="flex-1 bg-cyan-500 text-slate-950 font-black py-5 rounded-2xl shadow-xl hover:bg-cyan-400 transition uppercase tracking-widest">Save & Sync</button>
                    <button @click="showEditor = false" class="px-8 py-5 text-slate-500 font-bold uppercase">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '473225830945-jg4s7dn69f77bibo27cvouqh00h45hlf.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        const { createApp, ref, computed, onMounted, watch } = Vue;
        createApp({
            setup() {
                const events = ref(JSON.parse(localStorage.getItem('englog_local') || '[]'));
                const isLoggedIn = ref(false);
                const showEditor = ref(false);
                const editorType = ref('note');
                const activeId = ref(null);
                const tempTitle = ref('');
                const tempNeedsTodo = ref(false);
                const tempContent = ref('');
                const tempItems = ref([{name:'', price:0}]);
                const tempFile = ref(null);
                const tempFileData = ref('');

                let tokenClient, driveFileId = null;

                // 本地儲存監控
                watch(events, (newVal) => {
                    localStorage.setItem('englog_local', JSON.stringify(newVal));
                }, { deep: true });

                onMounted(() => {
                    const timer = setInterval(() => {
                        if (window.google && window.gapi) {
                            clearInterval(timer);
                            initGoogleServices();
                        }
                    }, 500);
                });

                function initGoogleServices() {
                    tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: CLIENT_ID, scope: SCOPES,
                        callback: async (resp) => { if (resp.access_token) { isLoggedIn.value = true; await setupDrive(); } },
                    });
                }

                async function setupDrive() {
                    gapi.load('client', async () => {
                        await gapi.client.init({ clientId: CLIENT_ID, scope: SCOPES });
                        await gapi.client.load('drive', 'v3');
                        await fetchCloudData();
                    });
                }

                // 強制彈出授權視窗邏輯
                const handleAuth = () => {
                    tokenClient.requestAccessToken({ prompt: 'select_account consent' });
                };

                const handleSignout = () => { isLoggedIn.value = false; location.reload(); };

                async function fetchCloudData() {
                    const resp = await gapi.client.drive.files.list({ q: "name = 'englog_data.json' and trashed = false" });
                    if (resp.result.files.length > 0) {
                        driveFileId = resp.result.files[0].id;
                        const content = await gapi.client.drive.files.get({ fileId: driveFileId, alt: 'media' });
                        if (content.result && content.result.length > 0) {
                            if (confirm('發現雲端資料，是否覆蓋本地？')) events.value = content.result;
                        }
                    }
                }

                async function uploadToDrive() {
                    if (!isLoggedIn.value) return;
                    const blob = new Blob([JSON.stringify(events.value)], { type: 'application/json' });
                    if (driveFileId) {
                        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
                            method: 'PATCH', headers: { 'Authorization': 'Bearer ' + gapi.client.getToken().access_token }, body: blob
                        });
                    } else {
                        const metadata = { name: 'englog_data.json', mimeType: 'application/json' };
                        const form = new FormData();
                        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                        form.append('file', blob);
                        const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                            method: 'POST', headers: { 'Authorization': 'Bearer ' + gapi.client.getToken().access_token }, body: form
                        });
                        const data = await res.json();
                        driveFileId = data.id;
                    }
                }

                const saveEvent = async () => {
                    const newE = { id: Date.now(), time: new Date().toLocaleString(), type: editorType.value, title: tempTitle.value, content: tempContent.value, items: [...tempItems.value], fileName: tempFile.value?.name, fileData: tempFileData.value, needsTodo: tempNeedsTodo.value, isDone: false };
                    events.value.push(newE);
                    showEditor.value = false;
                    await uploadToDrive();
                };

                const downloadBackup = () => {
                    const blob = new Blob([JSON.stringify(events.value, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = `englog_backup_${new Date().toLocaleDateString()}.json`;
                    a.click();
                };

                const handleFileUpload = (e) => {
                    const file = e.target.files[0]; if(!file) return;
                    tempFile.value = file;
                    const r = new FileReader(); r.onload = (res) => tempFileData.value = res.target.result; r.readAsDataURL(file);
                };

                const viewPDF = (data) => {
                    const newTab = window.open();
                    newTab.document.write(`<iframe src="${data}" frameborder="0" style="border:0; top:0px; left:0px; bottom:0px; right:0px; width:100%; height:100%;" allowfullscreen></iframe>`);
                };

                return { 
                    events, sortedEvents: computed(()=>[...events.value].sort((a,b)=>b.id-a.id)), 
                    isLoggedIn, showEditor, editorType, activeId, tempTitle, tempContent, tempItems, tempNeedsTodo,
                    handleAuth, handleSignout, downloadBackup,
                    openEditor: (t)=>{editorType.value=t; tempTitle.value=''; tempContent.value=''; tempNeedsTodo.value=false; showEditor.value=true;}, 
                    saveEvent, handleFileUpload, viewPDF, toggleStatus: async (e)=>{ e.isDone = !e.isDone; await uploadToDrive(); },
                    scrollToEvent: (id)=>{ activeId.value=id; document.getElementById('event-'+id).scrollIntoView({behavior:'smooth'}); },
                    deleteEvent: async (id)=>{ if(confirm('刪除？')) { events.value=events.value.filter(e=>e.id!==id); await uploadToDrive(); } }
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
