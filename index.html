<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngLog Pro - 穩定同步版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .event-card { border-left: 4px solid #334155; background: rgba(30, 41, 59, 0.4); }
        .is-pending { border-left-color: #facc15; }
        .is-done { border-left-color: #22c55e; }
    </style>
</head>
<body class="h-screen flex flex-col">
    <div id="app" class="flex flex-col h-full">
        <header class="h-20 flex-none glass border-b border-white/5 px-8 flex justify-between items-center z-50">
            <h1 class="text-xl font-black italic text-cyan-400">ENGLOG</h1>
            <div class="flex items-center gap-4">
                <div v-if="isLoggedIn" class="text-[10px] text-cyan-400 font-bold bg-cyan-500/10 px-4 py-2 rounded-full border border-cyan-500/20">
                    <i class="fas fa-check-circle mr-2"></i>雲端同步已啟動
                </div>
                <button v-else @click="handleAuth" 
                        class="bg-white text-slate-900 px-6 py-2 rounded-full text-xs font-black shadow-lg hover:bg-cyan-400 transition">
                    <i class="fab fa-google mr-2"></i> 登入 Google 同步
                </button>
                <button v-if="isLoggedIn" @click="handleSignout" class="text-xs text-slate-500">登出</button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-12 bg-slate-900/10">
            <div v-if="!isLoggedIn" class="max-w-xl mx-auto text-center py-20 border-2 border-dashed border-slate-800 rounded-[3rem]">
                <i class="fas fa-cloud-upload-alt text-5xl text-slate-700 mb-6"></i>
                <h2 class="text-xl font-bold mb-4">歡迎回來！</h2>
                <p class="text-slate-500 text-sm mb-8">請登入以存取您的工程日誌。<br>您的數據儲存於私人的 Google Drive 中。</p>
            </div>
            
            <div v-else class="max-w-3xl mx-auto space-y-6">
                <div class="flex gap-2 mb-10">
                    <button @click="openEditor('note')" class="flex-1 p-4 rounded-2xl bg-sky-500/10 text-sky-400 border border-sky-500/20 font-bold text-sm hover:bg-sky-500 hover:text-white transition">新增日誌 (附標題)</button>
                </div>
                
                <div v-for="e in sortedEvents" :key="e.id" class="event-card p-8 rounded-3xl" :class="e.needsTodo ? (e.isDone ? 'is-done' : 'is-pending') : ''">
                    <div class="flex justify-between items-start mb-4">
                        <h2 class="text-xl font-bold text-white">{{ e.title }}</h2>
                        <button v-if="e.needsTodo" @click="toggleStatus(e)" class="text-[10px] px-3 py-1 rounded-full border border-white/10 uppercase">
                            {{ e.isDone ? 'Finished' : 'Pending' }}
                        </button>
                    </div>
                    <div class="text-sm text-slate-400 font-mono whitespace-pre-wrap">{{ e.content }}</div>
                </div>
            </div>
        </main>

        <div v-if="showEditor" class="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6">
            <div class="bg-slate-900 w-full max-w-lg rounded-[2.5rem] p-10 border border-white/10">
                <h3 class="text-2xl font-bold mb-6 text-white uppercase italic">建立新事件</h3>
                <input v-model="tempTitle" class="w-full bg-slate-950 p-4 rounded-xl mb-4 text-white border border-white/5" placeholder="輸入標題 (例如：Realtek RTL8735B 環境除錯)">
                <div class="flex items-center gap-3 mb-6 bg-white/5 p-3 rounded-xl">
                    <input type="checkbox" v-model="tempNeedsTodo" id="td-check">
                    <label for="td-check" class="text-sm text-slate-400 font-bold">這是一個待辦事項 (To-Do)</label>
                </div>
                <textarea v-model="tempContent" class="w-full h-40 bg-slate-950 p-4 rounded-xl mb-6 text-sm font-mono text-slate-300" placeholder="內容描述..."></textarea>
                <div class="flex gap-4">
                    <button @click="saveEvent" class="flex-1 bg-cyan-500 text-slate-950 font-black py-4 rounded-xl shadow-lg">發佈至雲端</button>
                    <button @click="showEditor = false" class="px-6 text-slate-500 font-bold">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '473225830945-jg4s7dn69f77bibo27cvouqh00h45hlf.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const events = ref([]);
                const isLoggedIn = ref(false);
                const showEditor = ref(false);
                const editorType = ref('note');
                const tempTitle = ref('');
                const tempContent = ref('');
                const tempNeedsTodo = ref(false);
                let tokenClient, driveFileId = null;

                // 2. 初始化核心
                onMounted(() => {
                    const checkInterval = setInterval(() => {
                        if (typeof google !== 'undefined' && typeof gapi !== 'undefined') {
                            clearInterval(checkInterval);
                            initGoogleServices();
                        }
                    }, 500);
                });

                function initGoogleServices() {
                    tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: CLIENT_ID,
                        scope: SCOPES,
                        callback: async (resp) => {
                            if (resp.access_token) {
                                isLoggedIn.value = true;
                                await setupDrive();
                            }
                        },
                    });
                }

                async function setupDrive() {
                    return new Promise((resolve) => {
                        gapi.load('client', async () => {
                            await gapi.client.init({ clientId: CLIENT_ID, scope: SCOPES });
                            await gapi.client.load('drive', 'v3');
                            await fetchCloudData();
                            resolve();
                        });
                    });
                }

                const handleAuth = () => {
                    if (tokenClient) tokenClient.requestAccessToken();
                };

                const handleSignout = () => { isLoggedIn.value = false; location.reload(); };

                async function fetchCloudData() {
                    const resp = await gapi.client.drive.files.list({ q: "name = 'englog_data.json' and trashed = false" });
                    if (resp.result.files.length > 0) {
                        driveFileId = resp.result.files[0].id;
                        const content = await gapi.client.drive.files.get({ fileId: driveFileId, alt: 'media' });
                        events.value = content.result || [];
                    }
                }

                async function uploadToDrive() {
                    if (!isLoggedIn.value) return;
                    const blob = new Blob([JSON.stringify(events.value)], { type: 'application/json' });
                    if (driveFileId) {
                        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
                            method: 'PATCH', headers: { 'Authorization': 'Bearer ' + gapi.client.getToken().access_token }, body: blob
                        });
                    } else {
                        const metadata = { name: 'englog_data.json', mimeType: 'application/json' };
                        const form = new FormData();
                        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                        form.append('file', blob);
                        const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                            method: 'POST', headers: { 'Authorization': 'Bearer ' + gapi.client.getToken().access_token }, body: form
                        });
                        const data = await res.json();
                        driveFileId = data.id;
                    }
                }

                const saveEvent = async () => {
                    if(!tempTitle.value) return alert('請輸入標題');
                    events.value.push({ id: Date.now(), time: new Date().toLocaleString(), title: tempTitle.value, content: tempContent.value, needsTodo: tempNeedsTodo.value, isDone: false });
                    showEditor.value = false;
                    await uploadToDrive();
                };

                return { 
                    events, sortedEvents: computed(()=>[...events.value].sort((a,b)=>b.id-a.id)), 
                    isLoggedIn, showEditor, tempTitle, tempContent, tempNeedsTodo, 
                    handleAuth, handleSignout, openEditor: (t)=>{tempTitle.value=''; tempContent.value=''; tempNeedsTodo.value=false; showEditor.value=true;},
                    saveEvent, toggleStatus: async(e)=>{e.isDone=!e.isDone; await uploadToDrive();}
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
