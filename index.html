<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngLog Pro - 同步修復版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .event-card { border-left: 4px solid #334155; background: rgba(30, 41, 59, 0.4); }
        .is-pending { border-left-color: #facc15; }
        .is-done { border-left-color: #22c55e; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="app" class="flex flex-col h-full">
        <header class="h-20 flex-none glass border-b border-white/5 px-8 flex justify-between items-center z-50">
            <h1 class="text-xl font-black italic text-cyan-400 uppercase">ENGLOG</h1>
            
            <div class="flex items-center gap-4">
                <div v-if="isLoggedIn" class="text-[10px] text-cyan-400 font-bold bg-cyan-500/10 px-4 py-2 rounded-full border border-cyan-500/20">
                    <i class="fas fa-sync fa-spin mr-2"></i>雲端已連線
                </div>
                <button v-if="!isLoggedIn" @click="handleAuth" :disabled="!isScriptsReady"
                        class="bg-white text-slate-900 px-6 py-2 rounded-full text-xs font-black shadow-lg hover:bg-cyan-400 disabled:opacity-30 transition">
                    <i v-if="!isScriptsReady" class="fas fa-spinner fa-spin mr-2"></i>
                    {{ isScriptsReady ? '登入 Google 同步' : '載入 Google 服務中...' }}
                </button>
                <button v-if="isLoggedIn" @click="handleSignout" class="text-xs text-slate-500 hover:text-red-400">登出</button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-12 custom-scroll">
            <div v-if="!isLoggedIn" class="max-w-xl mx-auto text-center py-20 border-2 border-dashed border-slate-800 rounded-[3rem]">
                <i class="fas fa-cloud-upload-alt text-5xl text-slate-700 mb-6"></i>
                <h2 class="text-xl font-bold mb-2">等待雲端同步...</h2>
                <p class="text-slate-500 text-sm">若登入按鈕長時間顯示「載入中」，請檢查網路連線或關閉廣告攔截器。</p>
            </div>
            
            <div v-else class="max-w-3xl mx-auto space-y-8">
                <div v-for="event in sortedEvents" :key="event.id" class="event-card p-8 rounded-3xl" :class="event.needsTodo ? (event.isDone ? 'is-done' : 'is-pending') : ''">
                    <h3 class="text-xl font-bold text-white mb-2">{{ event.title }}</h3>
                    <div class="text-sm text-slate-400 font-mono whitespace-pre-wrap">{{ event.content }}</div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://apis.google.com/js/api.js"></script>

    <script>
        const CLIENT_ID = '473225830945-jg4s7dn69f77bibo27cvouqh00h45hlf.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const events = ref([]);
                const isLoggedIn = ref(false);
                const isScriptsReady = ref(false);
                let tokenClient;

                onMounted(() => {
                    // 每 0.5 秒檢查一次 Google SDK 是否載入完成
                    const checkInterval = setInterval(() => {
                        if (typeof google !== 'undefined' && typeof gapi !== 'undefined') {
                            clearInterval(checkInterval);
                            initGoogleServices();
                        }
                    }, 500);
                });

                function initGoogleServices() {
                    try {
                        tokenClient = google.accounts.oauth2.initTokenClient({
                            client_id: CLIENT_ID,
                            scope: SCOPES,
                            callback: async (resp) => {
                                if (resp.access_token) {
                                    isLoggedIn.value = true;
                                    await startDriveSync();
                                }
                            },
                        });
                        isScriptsReady.value = true;
                        console.log("Google Services Ready.");
                    } catch (e) {
                        console.error("Initialization Failed:", e);
                    }
                }

                async function startDriveSync() {
                    return new Promise((resolve) => {
                        gapi.load('client', async () => {
                            await gapi.client.init({ clientId: CLIENT_ID, scope: SCOPES });
                            await gapi.client.load('drive', 'v3');
                            // 載入雲端資料邏輯...
                            resolve();
                        });
                    });
                }

                const handleAuth = () => {
                    if (tokenClient) {
                        tokenClient.requestAccessToken();
                    } else {
                        alert("Google 服務尚未就緒，請稍後再試。");
                    }
                };

                const handleSignout = () => { isLoggedIn.value = false; location.reload(); };

                return { events, isLoggedIn, isScriptsReady, handleAuth, handleSignout, sortedEvents: computed(()=>events.value) };
            }
        }).mount('#app');
    </script>
</body>
</html>
