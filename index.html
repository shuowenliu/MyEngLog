<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngLog Pro v7.1 - Supabase 穩定版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .event-card { border-left: 4px solid #334155; background: rgba(30, 41, 59, 0.4); transition: all 0.3s; }
        .is-pending { border-left-color: #facc15; }
        .is-done { border-left-color: #22c55e; }
        .nav-active { background: rgba(34, 211, 238, 0.1); border-right: 3px solid #22d3ee; color: #22d3ee; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="app" class="flex flex-col h-full">
        <header class="h-20 flex-none glass border-b border-white/5 px-8 flex justify-between items-center z-50">
            <div class="flex items-center gap-6">
                <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">ENG<span class="text-cyan-400">LOG</span></h1>
                <nav v-if="isLoggedIn" class="flex gap-2">
                    <button @click="openEditor('note')" class="px-4 py-2 rounded-xl bg-sky-500/10 text-sky-400 text-xs font-bold border border-sky-500/20 hover:bg-sky-500 hover:text-white transition">撰寫日誌</button>
                    <button @click="openEditor('buy')" class="px-4 py-2 rounded-xl bg-emerald-500/10 text-emerald-400 text-xs font-bold border border-emerald-500/20 hover:bg-emerald-500 hover:text-white transition">採購清單</button>
                    <button @click="openEditor('file')" class="px-4 py-2 rounded-xl bg-red-500/10 text-red-400 text-xs font-bold border border-red-500/20 hover:bg-red-500 hover:text-white transition">文件上傳</button>
                </nav>
            </div>

            <div class="flex items-center gap-4">
                <div v-if="isLoggedIn" class="flex items-center gap-3 bg-emerald-500/5 px-4 py-2 rounded-full border border-emerald-500/20">
                    <i class="fas fa-bolt text-emerald-400 text-[10px]"></i>
                    <span class="text-[9px] font-bold text-emerald-400 uppercase tracking-widest">Live Sync</span>
                    <button @click="handleSignout" class="text-[9px] text-slate-500 hover:text-red-400 ml-1">登出</button>
                </div>
                <button v-else @click="handleAuth" class="bg-white text-slate-900 px-6 py-2 rounded-full text-xs font-black shadow-lg hover:bg-cyan-400 transition">Google 登入同步</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-64 flex-none border-r border-white/5 bg-slate-950/40 overflow-y-auto custom-scroll">
                <div class="p-4 text-[10px] font-bold text-slate-600 uppercase tracking-[0.2em] border-b border-white/5 mb-2 italic text-center">Timeline</div>
                <div v-for="event in sortedEvents" :key="event.id" @click="scrollToEvent(event.id)"
                     :class="activeId === event.id ? 'nav-active' : 'text-slate-500 hover:bg-white/5'"
                     class="px-6 py-4 cursor-pointer transition flex flex-col gap-1 border-b border-white/5">
                    <span class="text-[9px] font-mono opacity-40">{{ event.time.split(' ')[0] }}</span>
                    <h4 class="text-xs font-bold truncate">{{ event.title || '未命名事件' }}</h4>
                </div>
            </aside>

            <main class="flex-1 overflow-y-auto p-12 custom-scroll bg-slate-900/10 space-y-10">
                <div v-if="!isLoggedIn" class="max-w-xl mx-auto text-center py-20 border-2 border-dashed border-slate-800 rounded-[3rem]">
                    <i class="fas fa-database text-5xl text-slate-700 mb-6"></i>
                    <h2 class="text-xl font-bold mb-4 text-white">使用 Supabase 同步</h2>
                    <p class="text-slate-500 text-sm">登入後資料將即時存入雲端資料庫。</p>
                </div>
                <div v-else v-for="event in sortedEvents" :id="'event-' + event.id" 
                     class="max-w-3xl mx-auto event-card p-8 rounded-[2rem] shadow-2xl relative"
                     :class="event.needsTodo ? (event.isDone ? 'is-done' : 'is-pending') : ''">
                    
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <div class="flex items-center gap-3 mb-2">
                                <span class="text-[10px] bg-white/5 px-2 py-0.5 rounded text-slate-500 font-mono">{{ event.time }}</span>
                                <span v-if="event.needsTodo" :class="event.isDone ? 'text-green-400 bg-green-400/10' : 'text-yellow-400 bg-yellow-400/10'" class="text-[9px] px-2 rounded font-bold uppercase">{{ event.isDone ? 'Done' : 'Action' }}</span>
                            </div>
                            <h2 class="text-2xl font-black text-white tracking-tight">{{ event.title }}</h2>
                        </div>
                        <div class="flex gap-2">
                            <button v-if="event.needsTodo" @click="toggleStatus(event)" class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center hover:bg-white/5"><i :class="event.isDone ? 'fas fa-check-circle text-green-400' : 'fas fa-circle text-yellow-500'"></i></button>
                            <button @click="deleteEvent(event.id)" class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center text-slate-700 hover:text-red-400"><i class="fas fa-trash-alt text-xs"></i></button>
                        </div>
                    </div>
                    <div class="bg-black/20 p-6 rounded-2xl border border-white/5">
                        <div v-if="event.type === 'note'" class="text-slate-300 text-sm font-mono whitespace-pre-wrap">{{ event.content }}</div>
                        <div v-if="event.type === 'buy'" class="space-y-1">
                            <div v-for="i in event.items" class="flex justify-between text-xs py-1 border-b border-white/5"><span class="text-slate-300">{{ i.name }}</span><span class="text-emerald-400 font-bold">NT$ {{ i.price }}</span></div>
                        </div>
                        <div v-if="event.type === 'file'" class="flex items-center gap-4">
                            <i class="fas fa-file-pdf text-red-500 text-3xl"></i>
                            <div class="flex-1 min-w-0"><p class="text-xs text-white font-bold truncate">{{ event.fileName }}</p></div>
                            <button @click="viewPDF(event.fileData)" class="px-6 py-2 bg-white text-slate-900 text-[10px] font-black rounded-xl hover:bg-cyan-400 transition">Open</button>
                        </div>
                    </div>
                </div>
                <div class="h-40"></div>
            </main>
        </div>

        <div v-if="showEditor" class="fixed inset-0 bg-slate-950/95 backdrop-blur-xl z-[100] flex items-center justify-center p-6">
            <div class="bg-slate-900 w-full max-w-xl rounded-[3rem] p-12 border border-white/10 shadow-2xl">
                <h3 class="text-3xl font-black mb-8 italic text-white uppercase tracking-tighter">New <span class="text-cyan-400">{{ editorType }}</span></h3>
                <div class="space-y-6">
                    <input v-model="tempTitle" class="w-full bg-slate-950 p-5 rounded-2xl border border-white/5 text-white font-bold" placeholder="事件標題...">
                    <div class="flex items-center gap-3 bg-white/5 p-4 rounded-2xl border border-white/5">
                        <input type="checkbox" v-model="tempNeedsTodo" id="td-check" class="w-5 h-5 accent-cyan-500">
                        <label for="td-check" class="text-sm font-bold text-slate-400 italic">標記為待辦任務</label>
                    </div>
                    <div v-if="editorType === 'note'"><textarea v-model="tempContent" class="w-full h-40 bg-slate-950 p-5 rounded-2xl text-sm font-mono text-slate-300" placeholder="內容描述..."></textarea></div>
                    <div v-if="editorType === 'file'"><input type="file" @change="handleFileUpload" accept="application/pdf,image/*" class="text-xs text-slate-500"></div>
                    <div v-if="editorType === 'buy'"><div v-for="i in tempItems" class="flex gap-2"><input v-model="i.name" class="flex-1 bg-slate-950 p-3 rounded-xl text-xs" placeholder="項目名"><input v-model.number="i.price" type="number" class="w-24 bg-slate-950 p-3 rounded-xl text-xs" placeholder="金額"></div></div>
                </div>
                <div class="flex gap-4 mt-10">
                    <button @click="saveEvent" class="flex-1 bg-cyan-500 text-slate-950 font-black py-5 rounded-2xl shadow-xl hover:bg-cyan-400 transition uppercase tracking-widest">Publish & Sync</button>
                    <button @click="showEditor = false" class="px-8 py-5 text-slate-500 font-bold uppercase">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://byrfhcmcnzhvwsedpleo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5cmZoY21jbnpodndzZWRwbGVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNDI5MjIsImV4cCI6MjA4ODYxODkyMn0.KgfxjKo4kasWfjasmpuM3DV0pzvmUVg-nx42-hVYc1w';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const CLIENT_ID = '473225830945-jg4s7dn69f77bibo27cvouqh00h45hlf.apps.googleusercontent.com';

        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const events = ref([]);
                const isLoggedIn = ref(false);
                const userEmail = ref('');
                const showEditor = ref(false);
                const editorType = ref('note');
                const activeId = ref(null);
                const tempTitle = ref('');
                const tempNeedsTodo = ref(false);
                const tempContent = ref('');
                const tempItems = ref([{name:'', price:0}]);
                const tempFile = ref(null);
                const tempFileData = ref('');

                onMounted(() => {
                    google.accounts.id.initialize({
                        client_id: CLIENT_ID,
                        callback: handleCredentialResponse
                    });
                    const savedEmail = localStorage.getItem('englog_user');
                    if (savedEmail) {
                        userEmail.value = savedEmail;
                        isLoggedIn.value = true;
                        fetchSupabaseData();
                    }
                });

                async function handleCredentialResponse(response) {
                    const payload = JSON.parse(atob(response.credential.split('.')[1]));
                    userEmail.value = payload.email;
                    localStorage.setItem('englog_user', payload.email);
                    isLoggedIn.value = true;
                    await fetchSupabaseData();
                }

                const handleAuth = () => google.accounts.id.prompt();
                const handleSignout = () => { localStorage.removeItem('englog_user'); location.reload(); };

                async function fetchSupabaseData() {
                    let { data, error } = await _supabase
                        .from('englog_data')
                        .select('content')
                        .eq('user_email', userEmail.value)
                        .maybeSingle();
                    
                    if (data) events.value = data.content;
                }

                async function syncToSupabase() {
                    if (!isLoggedIn.value) return;
                    // 修正關鍵：upsert 必須對應 Unique 索引欄位
                    const { error } = await _supabase
                        .from('englog_data')
                        .upsert({ 
                            user_email: userEmail.value, 
                            content: events.value 
                        }, { onConflict: 'user_email' });
                    
                    if (error) console.error('Supabase Sync Error:', error.message);
                }

                const saveEvent = async () => {
                    const newE = { id: Date.now(), time: new Date().toLocaleString(), type: editorType.value, title: tempTitle.value, content: tempContent.value, items: [...tempItems.value], fileName: tempFile.value?.name, fileData: tempFileData.value, needsTodo: tempNeedsTodo.value, isDone: false };
                    events.value.push(newE);
                    showEditor.value = false;
                    await syncToSupabase();
                };

                const handleFileUpload = (e) => {
                    const file = e.target.files[0]; if(!file) return;
                    tempFile.value = file;
                    const r = new FileReader(); r.onload = (res) => tempFileData.value = res.target.result; r.readAsDataURL(file);
                };

                const viewPDF = (data) => {
                    const newTab = window.open();
                    newTab.document.write(`<iframe src="${data}" frameborder="0" style="border:0; top:0px; left:0px; bottom:0px; right:0px; width:100%; height:100%;" allowfullscreen></iframe>`);
                };

                return { 
                    events, sortedEvents: computed(()=>[...events.value].sort((a,b)=>b.id-a.id)), 
                    isLoggedIn, showEditor, editorType, activeId, tempTitle, tempContent, tempItems, tempNeedsTodo,
                    handleAuth, handleSignout, 
                    openEditor: (t)=>{editorType.value=t; tempTitle.value=''; tempContent.value=''; tempNeedsTodo.value=false; showEditor.value=true;}, 
                    saveEvent, handleFileUpload, viewPDF, toggleStatus: async (e)=>{ e.isDone = !e.isDone; await syncToSupabase(); },
                    scrollToEvent: (id)=>{ activeId.value=id; document.getElementById('event-'+id).scrollIntoView({behavior:'smooth'}); },
                    deleteEvent: async (id)=>{ if(confirm('刪除？')) { events.value=events.value.filter(e=>e.id!==id); await syncToSupabase(); } }
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
